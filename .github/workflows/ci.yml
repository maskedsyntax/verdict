name: CI

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test tool packages/verdict_engine/lib packages/verdict_engine/test
      - run: flutter analyze
      - run: flutter test
      - run: dart test
        working-directory: packages/verdict_engine
      - run: flutter build apk --debug
